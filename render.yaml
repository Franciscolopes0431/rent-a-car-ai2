services:
  - type: web
    name: rentcar-api
    runtime: node
    rootDir: rent-a-car/backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_SSL
        value: "true"
      - key: DB_SSL_REJECT_UNAUTHORIZED
        value: "true"
      - key: COOKIE_SAME_SITE
        value: strict
      - key: TRUST_PROXY_HOPS
        value: "1"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
